<!doctype html>
<html>
  <head>
    <title>Shape Classifier Debug</title>
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  </head>

  <body>
    <h2>Draw a Shape</h2>

    <canvas
      id="canvas"
      width="256"
      height="256"
      style="border: 1px solid black"
    ></canvas>
    <br /><br />

    <button onclick="clearCanvas()">Clear</button>
    <button onclick="predict()">Predict</button>
    <button onclick="saveSample()">Save Sample</button>
    <button onclick="downloadSamples()">Download All Samples</button>
    <button onclick="clearSavedSamples()">Clear Saved Samples</button>
    <select id="labelSelect"></select>
    <span id="sampleCount">Saved: 0</span>
    <p style="font-size: 0.8em; color: gray;">
      Note: Save downloaded files to <code>data/raw/collected/</code> to include them in the next training run.
    </p>

    <h3 id="result">Prediction:</h3>

    <h3>Model Input (64×64)</h3>
    <canvas
      id="debugCanvas"
      width="128"
      height="128"
      style="border: 1px solid red"
    ></canvas>

    <pre id="logits"></pre>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");
      const debugCanvas = document.getElementById("debugCanvas");
      const dctx = debugCanvas.getContext("2d");
      const MODEL_SIZE = 64;
      const MODEL_LINE_WIDTH = 2;
      const MODEL_PADDING_RATIO = 0.08;

      // white background
      function fillWhite(targetCtx, width, height) {
        targetCtx.fillStyle = "white";
        targetCtx.fillRect(0, 0, width, height);
      }

      fillWhite(ctx, canvas.width, canvas.height);
      fillWhite(dctx, debugCanvas.width, debugCanvas.height);

      let drawing = false;
      let lastX = null;
      let lastY = null;
      let currentStroke = [];
      let strokePoints = [];

      function finishStroke() {
        drawing = false;
        lastX = null;
        lastY = null;

        if (currentStroke.length > 0) {
          strokePoints = strokePoints.concat(currentStroke);
          currentStroke = [];
        }
      }

      canvas.addEventListener("mousedown", () => (drawing = true));
      canvas.addEventListener("mouseup", finishStroke);
      canvas.addEventListener("mouseleave", finishStroke);
      canvas.addEventListener("mousemove", draw);

      function draw(e) {
        if (!drawing) return;

        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        currentStroke.push([x, y]);

        if (lastX !== null) {
          ctx.strokeStyle = "black";
          ctx.lineWidth = 8;
          ctx.lineCap = "round";

          ctx.beginPath();
          ctx.moveTo(lastX, lastY);
          ctx.lineTo(x, y);
          ctx.stroke();
        }

        lastX = x;
        lastY = y;
      }

      function clearCanvas() {
        fillWhite(ctx, canvas.width, canvas.height);
        fillWhite(dctx, debugCanvas.width, debugCanvas.height);
        currentStroke = [];
        strokePoints = [];
        lastX = null;
        lastY = null;
      }

      // labels
      const labels = [
        "ellipse",
        "line",
        "triangle",
        "rectangle",
        "pentagon",
        "hexagon",
        "star",
        "zigzag",
        "arc",
        "heart",
        "diamond",
        "arrow",
        "double_arrow",
        "cloud",
        "message",
        "parallelogram",
      ];
      const labelSelect = document.getElementById("labelSelect");
      const sampleCount = document.getElementById("sampleCount");
      const STORAGE_KEY = "shape_classifier_samples";
      for (const label of labels) {
        const option = document.createElement("option");
        option.value = label;
        option.textContent = label;
        labelSelect.appendChild(option);
      }

      function loadSavedSamples() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          return raw ? JSON.parse(raw) : [];
        } catch (error) {
          console.error("Failed to load saved samples", error);
          return [];
        }
      }

      function persistSamples(samples) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(samples));
        sampleCount.textContent = `Saved: ${samples.length}`;
      }

      persistSamples(loadSavedSamples());

      let session = null;

      async function loadModel() {
        const modelUrl = `./model.onnx?v=${Date.now()}`;
        session = await ort.InferenceSession.create(modelUrl);
      }

      function getAllPoints() {
        return strokePoints.concat(currentStroke);
      }

      function paintSquare(pixels, size, x, y, radius) {
        for (let dy = -radius; dy <= radius; dy++) {
          for (let dx = -radius; dx <= radius; dx++) {
            const px = x + dx;
            const py = y + dy;
            if (px < 0 || px >= size || py < 0 || py >= size) continue;
            pixels[py * size + px] = 255;
          }
        }
      }

      function drawRasterLine(pixels, size, x0, y0, x1, y1, lineWidth) {
        let x = x0;
        let y = y0;
        const dx = Math.abs(x1 - x0);
        const dy = Math.abs(y1 - y0);
        const sx = x0 < x1 ? 1 : -1;
        const sy = y0 < y1 ? 1 : -1;
        let err = dx - dy;
        const radius = Math.max(0, Math.floor((lineWidth - 1) / 2));

        while (true) {
          paintSquare(pixels, size, x, y, radius);
          if (x === x1 && y === y1) break;
          const e2 = 2 * err;
          if (e2 > -dy) {
            err -= dy;
            x += sx;
          }
          if (e2 < dx) {
            err += dx;
            y += sy;
          }
        }
      }

      // Match Python's stroke_to_image: min-max normalize the captured points,
      // add padding, and rasterize line segments onto integer pixels.
      function pointsToModelInput(points, size = MODEL_SIZE) {
        const validPoints = points.filter(
          (point) =>
            Array.isArray(point) &&
            point.length === 2 &&
            Number.isFinite(point[0]) &&
            Number.isFinite(point[1]),
        );

        if (validPoints.length < 2) {
          return null;
        }

        let minX = validPoints[0][0];
        let minY = validPoints[0][1];
        let maxX = validPoints[0][0];
        let maxY = validPoints[0][1];

        for (const [x, y] of validPoints) {
          minX = Math.min(minX, x);
          minY = Math.min(minY, y);
          maxX = Math.max(maxX, x);
          maxY = Math.max(maxY, y);
        }

        let rangeX = maxX - minX;
        let rangeY = maxY - minY;

        if (rangeX === 0) rangeX = 1;
        if (rangeY === 0) rangeY = 1;

        const innerScale = Math.max(1.0 - 2.0 * MODEL_PADDING_RATIO, 1e-6);
        const rasterPoints = [];

        validPoints.forEach(([x, y], index) => {
          const nx = ((x - minX) / rangeX) * innerScale + MODEL_PADDING_RATIO;
          const ny = ((y - minY) / rangeY) * innerScale + MODEL_PADDING_RATIO;
          const px = Math.min(Math.max(nx, 0), 1) * (size - 1);
          const py = Math.min(Math.max(ny, 0), 1) * (size - 1);
          rasterPoints.push([Math.round(px), Math.round(py)]);
        });

        const pixels = new Uint8Array(size * size);
        for (let i = 0; i < rasterPoints.length - 1; i++) {
          const [x0, y0] = rasterPoints[i];
          const [x1, y1] = rasterPoints[i + 1];
          drawRasterLine(pixels, size, x0, y0, x1, y1, MODEL_LINE_WIDTH);
        }

        const input = new Float32Array(size * size);
        const debugImage = dctx.createImageData(size, size);

        for (let i = 0; i < size * size; i++) {
          const val = pixels[i];
          const normalized = 1.0 - val / 255.0;
          input[i] = normalized;

          const debugVal = val;
          debugImage.data[i * 4] = debugVal;
          debugImage.data[i * 4 + 1] = debugVal;
          debugImage.data[i * 4 + 2] = debugVal;
          debugImage.data[i * 4 + 3] = 255;
        }

        const debugTempCanvas = document.createElement("canvas");
        debugTempCanvas.width = size;
        debugTempCanvas.height = size;
        debugTempCanvas.getContext("2d").putImageData(debugImage, 0, 0);

        dctx.imageSmoothingEnabled = false;
        dctx.clearRect(0, 0, debugCanvas.width, debugCanvas.height);
        dctx.drawImage(debugTempCanvas, 0, 0, debugCanvas.width, debugCanvas.height);

        return input;
      }

      // ---------- prediction ----------
      async function predict() {
        if (!session) {
          alert("Model not loaded yet");
          return;
        }

        const inputData = pointsToModelInput(getAllPoints());

        if (!inputData) {
          alert("Draw something first");
          return;
        }

        const tensor = new ort.Tensor("float32", inputData, [1, 1, MODEL_SIZE, MODEL_SIZE]);

        const outputs = await session.run({ input: tensor });
        const logits = outputs.output.data;

        // print logits
        document.getElementById("logits").innerText =
          "Logits:\n" +
          Array.from(logits)
            .map((v, i) => labels[i] + ": " + v.toFixed(3))
            .join("\n");

        let maxIdx = 0;
        let maxVal = logits[0];

        for (let i = 1; i < logits.length; i++) {
          if (logits[i] > maxVal) {
            maxVal = logits[i];
            maxIdx = i;
          }
        }

        document.getElementById("result").innerText =
          "Prediction: " + labels[maxIdx];
      }

      function saveSample() {
        const points = getAllPoints();
        if (points.length < 2) {
          alert("Draw something first");
          return;
        }

        let label = labelSelect.value;
        if (label === "square") label = "rectangle";
        if (label === "circle") label = "ellipse";

        const sample = {
          label,
          points,
          source: "browser",
          created_at: new Date().toISOString(),
        };

        const samples = loadSavedSamples();
        samples.push(sample);
        persistSamples(samples);
        document.getElementById("result").innerText =
          `Prediction: saved sample for ${sample.label}`;
        clearCanvas();
      }

      function downloadSamples() {
        const samples = loadSavedSamples();
        if (samples.length === 0) {
          alert("No saved samples yet");
          return;
        }

        const blob = new Blob([JSON.stringify(samples, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `browser-samples-${Date.now()}.json`; // Move to data/raw/collected/
        a.click();
        URL.revokeObjectURL(url);
      }

      function clearSavedSamples() {
        const samples = loadSavedSamples();
        if (
          samples.length > 0 &&
          !window.confirm(`Delete all ${samples.length} saved samples?`)
        ) {
          return;
        }
        persistSamples([]);
      }

      loadModel();
    </script>
  </body>
</html>
